services:
  db:
    image: postgres:15-alpine
    container_name: aps_core_db
    environment:
      POSTGRES_USER: ${APS_DB_USER:-aps_user}
      POSTGRES_PASSWORD: ${APS_DB_PASSWORD:-aps12345}
      POSTGRES_DB: ${APS_DB_NAME:-aps_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APS_DB_USER:-aps_user} -d ${APS_DB_NAME:-aps_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: aps_core_api
    depends_on:
      db:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      APS_DB_URL: postgresql://${APS_DB_USER:-aps_user}:${APS_DB_PASSWORD:-aps12345}@db:5432/${APS_DB_NAME:-aps_db}
      # Container → Neo4j: hostname "neo4j" (service name). localhost in .env breaks the connection from the API container.
      APS_NEO4J_URI: ${APS_NEO4J_URI:-bolt://neo4j:7687}
      APS_NEO4J_USER: ${APS_NEO4J_USER:-neo4j}
      APS_NEO4J_PASSWORD: ${APS_NEO4J_PASSWORD:-aps-password}
      APS_NEO4J_DATABASE: ${APS_NEO4J_DATABASE:-neo4j}
      APS_CALENDAR_TIMEZONE: ${APS_CALENDAR_TIMEZONE:-UTC}
      API_VERSION: ${API_VERSION:-v1}
      DEBUG: ${DEBUG:-False}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AI_ENGINE_URL: ${AI_ENGINE_URL:-}
      AI_ENGINE_TIMEOUT: ${AI_ENGINE_TIMEOUT:-300}
      GSYSTEM_BASE_URL: ${GSYSTEM_BASE_URL:-}
      GSYSTEM_API_KEY: ${GSYSTEM_API_KEY:-}
      GSYSTEM_TIMEOUT: ${GSYSTEM_TIMEOUT:-30}
      GSYSTEM_RETRIES: ${GSYSTEM_RETRIES:-3}
      GSYSTEM_DB_URL: ${GSYSTEM_DB_URL:-}
      GSYSTEM_DB_USER: ${GSYSTEM_DB_USER:-}
      GSYSTEM_DB_PASSWORD: ${GSYSTEM_DB_PASSWORD:-}
      GSYSTEM_SYNC_CRON_ENABLED: ${GSYSTEM_SYNC_CRON_ENABLED:-false}
      GSYSTEM_SYNC_CRON: ${GSYSTEM_SYNC_CRON:-0 3 * * 0}
      GSYSTEM_SYNC_CRON_TIMEZONE: ${GSYSTEM_SYNC_CRON_TIMEZONE:-UTC}
    ports:
      - "8001:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
    # Production-like runtime: never use --reload in container stress/prod.
    # --reload + bind mounts can starve workers during heavy UI/API traffic.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS --max-time 5 http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 8s
      start_period: 30s
      retries: 5
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    container_name: aps_neo4j
    environment:
      NEO4J_AUTH: ${APS_NEO4J_USER:-neo4j}/${APS_NEO4J_PASSWORD:-aps-password}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${APS_NEO4J_USER:-neo4j}", "-p", "${APS_NEO4J_PASSWORD:-aps-password}", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  neo4j_data:
